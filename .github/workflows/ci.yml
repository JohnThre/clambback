name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install dependencies
        run: |
          dnf install -y --allowerasing \
            gcc-c++ cmake make git \
            boost-devel boost-program-options boost-system \
            openssl-devel openssl rpm-build \
            curl nmap-ncat python3
      - uses: actions/checkout@v4
      - name: Trust the checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Configure
        run: cmake -S . -B build -DENABLE_MYSQL=OFF -DSYSTEMD_SERVICE=OFF -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_SYSCONFDIR=/etc
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Package
        run: |
          cpack --config build/CPackConfig.cmake -G TGZ
          cpack --config build/CPackConfig.cmake -G RPM
      - uses: actions/upload-artifact@v4
        with:
          name: rocky-packages
          path: |
            build/*.tar.gz
            build/*.rpm

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install boost openssl@3
      - name: Configure
        run: cmake -S . -B build -DENABLE_MYSQL=OFF -DSYSTEMD_SERVICE=OFF -DDEFAULT_CONFIG="${HOMEBREW_PREFIX}/etc/clambback/config.json" -DCMAKE_PREFIX_PATH="$(brew --prefix boost);$(brew --prefix openssl@3)"
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Version
        run: build/clambback --version
