name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl libboost-program-options-dev libboost-system-dev libssl-dev netcat-openbsd openssl python3 rpm
      - name: Configure
        run: cmake -S . -B build -DENABLE_MYSQL=OFF -DSYSTEMD_SERVICE=OFF -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_SYSCONFDIR=/etc
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Package
        run: |
          cpack --config build/CPackConfig.cmake -G TGZ
          cpack --config build/CPackConfig.cmake -G DEB
          cpack --config build/CPackConfig.cmake -G RPM
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flags=()
          case "$GITHUB_REF_NAME" in
            *-alpha.*|*-beta.*|*-rc.*)
              prerelease_flags+=(--prerelease --latest=false)
              ;;
          esac

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" build/*.tar.gz build/*.deb build/*.rpm --clobber
            if [[ ${#prerelease_flags[@]} -gt 0 ]]; then
              gh release edit "$GITHUB_REF_NAME" "${prerelease_flags[@]}"
            fi
          else
            gh release create "$GITHUB_REF_NAME" build/*.tar.gz build/*.deb build/*.rpm --generate-notes "${prerelease_flags[@]}"
          fi
